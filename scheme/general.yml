version: "1.0"

scheme: /general
type: dict
meta:
    label: General
content:
-   key: storage
    type: dict
    meta:
        label: Storage
        comment: |
            Local and remote storage locations.
        ui: ana.config.general
        actions:
    content:
    -   key: searchpath
        type: table
        meta:
            label: Search paths
            comment: |
                File storage search path.

                Depending on the computing environment, files may be stored in locations with
                a different root (for example when moving from a Microsoft Windows to a
                Linux workstation). This allows files to be represented as, for example

                    {storage}/rawdata/datafile-01.data

                so that configuration files do not need to be edited for different environments.
        content:
        -   key: location
            type: path
            meta:
                label: Location
                comment: |
                    Local path or remote URL.

                    Supported schemes:
                    - file system path (/path/to/data, C:\path\to\data, or file:/path/to/data)
                    - UNC paths (\\server\share or //server/share)
                    - URLs (except file: scheme, e.g. https://server/path)
        -   key: class
            type: category
            meta:
                label: Storage class
                categories:
                -   value: "local"
                    label: "Local"
                -   value: "network"
                    label: "Network"
                -   value: "external"
                    label: "External"
                default: local
                comment: |
                    Local storage means storage that is permanently connected to the computing device (*).

                    Network storage encompasses everything, that is accessible via a network but is not
                    necessarily permanently connected (*). Especially on workstations or any computing 
                    device, this includes mapped network drives, remote file-systems, and cloud storage, 
                    including WebDAV, S3, etc.).

                    External storage refers to removable media, such has USB hard disks, SD cards, etc.
                    (mind that this requires a consistent mount point [Linux/Unix] or drive letter 
                    [Windows]).

                    (*) Note, that the distinction between "local" and "network" is not always obvious. 
                    If network storage is expected to be online permanently (which is, for example
                    the case in a HPC environment where a network failure implies a general system failure),
                    it should be considered "local" storage, otherwise, it is a "network" storage.
    -   key: scratch
        type: path
        meta:
            label: Scratch directory
            comment: |
                Local scratch directory (for temporary large files).
            default: 
                eval: |
                    ana.os.paths('tmpdir')
