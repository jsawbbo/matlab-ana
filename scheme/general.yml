version: "1.0"

key: /general
type: map
meta:
    label: General
children:
-   key: storage
    type: dict
    meta:
        label: Storage
        comment: |
            Local and remote storage locations.
        ui: ana.config.general
        actions:
    children:
    -   key: searchpath
        type: table
        meta:
            label: Search paths
            comment: |
                File storage search path.

                Depending on the computing environment, files may be stored in locations with
                a different root (for example when moving from a Microscoft Windows to a
                Linux workstation). This allows files to be represented as, for example

                    {storage}/rawdata/datafile-01.data

                so that a configuration file must not be edited.
        children:
        -   key: location
            type: path
            meta:
                label: Location
                comment: "Local path or remote URL."
        -   key: remote
            type: category
            meta:
                label: Remote
                choice:
                -   value: "local"
                    label: "Local"
                -   value: "remote"
                    label: "Remote"
                -   value: "removable"
                    label: "Removable"
                default: local
                comment: "Search path residing on a remote system."
    -   key: scratch
        type: path
        meta:
            label: Scratch directory
            comment: "Local scratch directory (for temporary large files)."
            default: 
                eval: |
                    string(ana.os.paths('tmpdir'))
    -   key: cache
        type: dict
        meta:
            label: Cache directory and size
        children:
        -   key: path
            type: path
            meta:
                label: Path
                comment: |
                    Cache directory.
        
                    FIXME
                default: 
                    eval: |
                        string(ana.os.paths('cachedir'))
        -   key: size
            type: numeric
            meta:
                label: Size
                comment: |
                    Maximum size of the cache directory (GiB).
    
                    FIXME
                default: 256
